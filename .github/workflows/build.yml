name: Build Check

on:
  push:
    branches: [ fixup ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64]
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: "1.24"
    - name: Tidy
      run: go mod tidy
    - name: Build
      run: |
        export GOOS=${{ matrix.goos }}
        export GOARCH=${{ matrix.goarch }}
        EXT=""
        if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
        go build -v -o xiaohongshu-mcp-${GOOS}-${GOARCH}${EXT} .
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: xiaohongshu-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
        path: xiaohongshu-mcp-*
